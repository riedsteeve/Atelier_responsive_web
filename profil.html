<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Affichage profil | Studiview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="style.css">

</head>
<body class="bg-white">
  
  <div class="p-4 max-w-5xl mx-auto">
    <div class="bg-[#874CF4] p-2 text-center w-10 h-10 rounded-full cursor-pointer" onclick="window.history.back()">
      <i class="fa-solid fa-arrow-left text-white text-sm"></i>
    </div>
  </div>
  
  <div class="max-w-5xl mx-auto p-4">

    <div class="flex flex-col lg:flex-row items-center gap-6 mb-12">
      <img src="" alt="Photo de profil" class="w-40 h-40 lg:w-48 lg:h-48 rounded-full border-4 border-[#874CF4] shadow-xl profile-photo object-cover">
      <div class="text-center lg:text-left">
        <h2 class="text-[#874CF4] text-4xl lg:text-6xl font-bold profile-name"></h2>
        <p class="p-2 rounded-lg" id="loc"></p>
      </div>
    </div>

    <div class="flex flex-col lg:flex-row gap-8">
      
      <div class="lg:w-1/2">
        <div class="bg-[#DAC7F2] p-6 rounded-2xl h-full border-2 border-[#874CF4] shadow-md" id="desc">
          <h2 class="italic font-bold text-2xl text-[#874CF4] mb-4 text-center lg:text-left">Description</h2>
        </div>
      </div>

      <div class="lg:w-1/2 flex flex-col gap-8">
        <div class="bg-[#DAC7F2] p-6 rounded-2xl border-2 border-[#874CF4] shadow-md" id="comm-container">
          <h2 class="text-2xl font-bold text-[#874CF4] mb-4 text-center lg:text-left">Notice</h2>
          <div id="comm" class="italic text-[#874CF4]"></div>
        </div>

        <div class="bg-[#DAC7F2] p-6 rounded-2xl border-2 border-[#874CF4] shadow-md">
          <h2 class="text-2xl font-bold text-[#874CF4] mb-4 text-center lg:text-left">Contacts</h2>
          <div id="cont" class="flex justify-around items-center"></div>
        </div>
      </div>

    </div>
  </div>

  <script src="data.js"></script>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const id = parseInt(urlParams.get('id'));
    const etudiantData = etudiants.find(e => e.id === id); 

    if(etudiantData){
      document.querySelectorAll('.profile-name').forEach(el => {
        el.textContent = `${etudiantData.prenom} ${etudiantData.nom}`;
      });
      document.querySelectorAll('.profile-photo').forEach(el => {
        el.src = etudiantData.photo_profil;
      });
      
      const schoolTop = document.getElementById('profile-school-top');
      if(schoolTop) schoolTop.textContent = etudiantData.ecole;

      const descdiv = document.getElementById('desc');
      descdiv.innerHTML += `
        <p class="text-[#874CF4] my-2 m-5 mt-4 lg:text-2xl md:text-lg"><strong>Filière :</strong> ${etudiantData.status}</p>
        <p class="text-[#874CF4] my-2 m-5 mt-4 lg:text-2xl md:text-lg"><strong>École :</strong> ${etudiantData.filiere}</p>
        <p class="text-[#874CF4] my-2 m-5 mt-4 lg:text-2xl md:text-lg"><strong>Promotion :</strong> ${etudiantData.promotion}</p>
        <p class="text-[#874CF4] my-2 m-5 mt-4 lg:text-2xl md:text-lg"><strong>Ecole :</strong> ${etudiantData.ecole}</p>
      `;

      const comm = document.getElementById('comm');
      comm.innerHTML = `<p class="text-center lg:text-left lg:text-lg m-4">"${etudiantData.commentaire}"</p>`;

      const contacts = document.getElementById('cont');
      contacts.innerHTML = `
        <a href="${etudiantData.linkedin}"><i class="fa-brands fa-linkedin text-blue-500 text-4xl"></i></a>
        <a href="${etudiantData.instagram}"><i class="fa-brands fa-instagram text-pink-500 text-4xl"></i></a>
        <a href="https://wa.me/${etudiantData.whatsapp}"><i class="fa-brands fa-whatsapp text-green-500 text-4xl"></i></a>
      `;
    }

    const loc = document.getElementById('loc');
    loc.innerHTML =`
      <p class="text-sm text-gray-500 text-lg"><i class="fa-solid fa-location-dot"></i> ${etudiantData.adresse}</p>
    `;

    function devientPlein() {
      const heartIcon = document.querySelector('.fa-heart');
      if(heartIcon) {
        heartIcon.classList.toggle('fa-solid');
        heartIcon.classList.toggle('text-purple-600');
      }
    }
   </script>
</body>
</html>
