<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceuil | StudiView - Votre application de recherche</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="bg-[#874CF4] p-6 rounded-lg m-4">
    <h1 class="text-white text-3xl">Hi, Welcome to </h1>
    <div class="flex ">
    <h3 class="font-bold text-white text-2xl">Studiview</h3>
    </div>
    <form id="search-form">
      <input type="search" id="search-input" placeholder="Rechercher un étudiant, une école..." class="p-2 rounded w-full mt-4 text-gray-800">
    </form>
  </nav>

  <h2 class="italic font-bold text-center mt-8 text-2xl text-[#80359B]">Top research</h2>

  <div>
    <ul class="form text-white">
      <li class="bg-[#874CF4] p-2 w-28 h-10 rounded-full text-center cursor-pointer">Tous</li>
      <li class="p-2 w-28 h-10 rounded-full text-center border border-[#874CF4] text-[#874CF4] bg-[#8AC1] cursor-pointer">Formations</li>
      <li class="p-2 w-28 h-10 rounded-full text-center border border-[#874CF4] text-[#874CF4] bg-[#8AC1] cursor-pointer">Promo</li>
      <li class="p-2 w-28 h-10 rounded-full text-center border border-[#874CF4] text-[#874CF4] bg-[#8AC1] cursor-pointer">Université</li>
      <li class="p-2 w-28 h-10 rounded-full text-center border border-[#874CF4] text-[#874CF4] bg-[#8AC1] cursor-pointer">Nouveau</li>
      <li class="p-2 w-28 h-10 rounded-full text-center border border-[#874CF4] text-[#874CF4] bg-[#8AC1] cursor-pointer">Top profil</li>
    </ul>
  </div>

  <div class="p-8 text-[#817CF8]">
    <h3 id="profile-count">Chargement des profils...</h3>
  </div>

  <div class="p-6">
    <div id="box" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      
    </div>
  </div>

  <script>
    const etudiants = [
      { "id": 1, "nom": "Gauthier", "prenom": "Léa", "photo_profil": "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=400&h=400&fit=crop", "filiere": "Communication Digitale", "ecole": "EFAP" },
      { "id": 2, "nom": "Masson", "prenom": "Lucas", "photo_profil": "https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?q=80&w=400&h=400&fit=crop", "filiere": "Ingénierie", "ecole": "INSA Lyon" },
      { "id": 3, "nom": "Belkacem", "prenom": "Yasmine", "photo_profil": "https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=400&h=400&fit=crop", "filiere": "Droit International", "ecole": "Assas" },
      { "id": 4, "nom": "Rivière", "prenom": "Hugo", "photo_profil": "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?q=80&w=400&h=400&fit=crop", "filiere": "Architecture", "ecole": "ENSA" },
      { "id": 5, "nom": "Moreau", "prenom": "Chloé", "photo_profil": "https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=400&h=400&fit=crop", "filiere": "Médecine", "ecole": "Sorbonne" },
      { "id": 6, "nom": "Diallo", "prenom": "Amadou", "photo_profil": "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&w=400&h=400&fit=crop", "filiere": "Informatique", "ecole": "EPITA" },
      { "id": 7, "nom": "Petit", "prenom": "Manon", "photo_profil": "https://images.unsplash.com/photo-1534528741775-53994a69daeb?q=80&w=400&h=400&fit=crop", "filiere": "Design Graphique", "ecole": "LISAA" },
      { "id": 8, "nom": "Lefebvre", "prenom": "Théo", "photo_profil": "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=400&h=400&fit=crop", "filiere": "Finance", "ecole": "HEC Paris" },
      { "id": 9, "nom": "Martinez", "prenom": "Sofia", "photo_profil": "https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e?q=80&w=400&h=400&fit=crop", "filiere": "Langues Étrangères", "ecole": "Lyon 2" },
    ];

    const container = document.getElementById('box');
    const countDisplay = document.getElementById('profile-count');
    const searchInput = document.getElementById('search-input');

    
    function afficherProfils(liste) {
      // je vide le container
      container.innerHTML = ''; 
      countDisplay.textContent = `${liste.length} profils trouvés`;

      liste.forEach(etudiant => {
        container.innerHTML += `
          <div class="bg-[#8AC1]/10 rounded-xl border-2 border-[#874CF4] p-4 flex items-center space-x-4 hover:shadow-lg transition-shadow">
            <img class="w-20 h-20 rounded-full object-cover border-2 border-white shadow-sm" src="${etudiant.photo_profil}" alt="Photo de ${etudiant.prenom}">
            <div class="flex-1">
              <h3 class="text-[#80359B] font-bold text-lg">${etudiant.prenom} ${etudiant.nom}</h3>
              <p class="text-[#874CF4] font-medium text-sm">${etudiant.filiere}</p>
              <p class="text-black-500 text-xs font-bold">${etudiant.ecole}</p>
            </div>
          </div>
        `;
      });
    }

    afficherProfils(etudiants);

    searchInput.addEventListener('input', (e) => {
      const recherche = e.target.value.toLowerCase();
      const resultats = etudiants.filter(etudiant => 
        etudiant.nom.toLowerCase().includes(recherche) || 
        etudiant.prenom.toLowerCase().includes(recherche) ||
        etudiant.filiere.toLowerCase().includes(recherche) ||
        etudiant.ecole.toLowerCase().includes(recherche)
      );
      afficherProfils(resultats);
    });

  </script>
</body>
</html>
