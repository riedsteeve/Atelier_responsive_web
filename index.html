<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceuil | StudiView - Votre application de recherche</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
  <nav class="bg-[#874CF4] p-6 rounded-lg m-4">
    <h1 class="text-white text-3xl">Hi, Welcome to </h1>
    <div class="flex">
    <h3 class="font-bold text-white text-2xl">Studiview</h3>
    </div>
    <form id="search-form">
      <input type="search" id="search-input" placeholder="Rechercher un étudiant, une école..." class="p-2 rounded w-full mt-4 text-gray-800">
    </form>
  </nav>

  <h2 class="italic font-bold text-center mt-8 text-2xl text-[#80359B] grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 flex justify-center items-center">Top research <hr class="w-64 lg:grid lg:w-full"></h2>
  

  <div>
    <ul class="form text-white">
      <li class="bg-[#874CF4] p-2 w-28 h-10 rounded-full text-center cursor-pointer">Tous</li>
      <li class="p-2 w-28 h-10 rounded-full text-center border border-[#874CF4] text-[#874CF4] bg-[#8AC1] cursor-pointer">Formations</li>
      <li class="p-2 w-28 h-10 rounded-full text-center border border-[#874CF4] text-[#874CF4] bg-[#8AC1] cursor-pointer">Promo</li>
      <li class="p-2 w-28 h-10 rounded-full text-center border border-[#874CF4] text-[#874CF4] bg-[#8AC1] cursor-pointer">Université</li>
      <li class="p-2 w-28 h-10 rounded-full text-center border border-[#874CF4] text-[#874CF4] bg-[#8AC1] cursor-pointer">Nouveau</li>
      <li class="p-2 w-28 h-10 rounded-full text-center border border-[#874CF4] text-[#874CF4] bg-[#8AC1] cursor-pointer">Top profil</li>
    </ul>
  </div>

  <div class="p-8 text-[#817CF8]">
    <h3 id="profile-count">Chargement des profils...</h3>
  </div>

  <div class="p-6">
    <div id="box" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      
    </div>
  </div>

  <script src="data.js"></script>
  
  <script>

    const container = document.getElementById('box');
    const countDisplay = document.getElementById('profile-count');
    const searchInput = document.getElementById('search-input');
  
    function afficherProfils(liste) {
      // je vide le container
      container.innerHTML = ''; 
      countDisplay.textContent = `${liste.length} profils trouvés`;

      liste.forEach(etudiant => {
        container.innerHTML += `
          <div class="bg-[#8AC1]/10 rounded-xl border-2 border-[#874CF4] p-4 flex items-center space-x-4 hover:shadow-lg transition-shadow cursor-pointer">
            <img class="w-20 h-20 rounded-full object-cover border-2 border-white shadow-sm" src="${etudiant.photo_profil}" onclick="window.location.href='profil.html?id=${etudiant.id}'" alt="Photo de ${etudiant.prenom}">
            <div class="flex-1">
              <h3 class="text-[#80359B] font-bold text-lg">${etudiant.prenom} ${etudiant.nom}</h3>
              <p class="text-[#874CF4] font-medium text-sm">${etudiant.filiere}</p>
              <p class="text-black-500 text-xs font-bold">${etudiant.ecole}</p>
            </div>
            <p class="text-[#874CF4] bg-gray-200 text-center p-2 h-8 rounded-full w-20 font-medium text-sm">${etudiant.status}</p>
             <i class="hidden lg:block fa-regular mt-24 fa-heart text-[#874CF4] text-2xl cursor-pointer" onclick="devientPlein()"></i>
          </div>
        `;
      });
    }

    afficherProfils(etudiants);

    searchInput.addEventListener('input', (e) => {
      const recherche = e.target.value.toLowerCase();
      const resultats = etudiants.filter(etudiant => 
        etudiant.nom.toLowerCase().includes(recherche) || 
        etudiant.prenom.toLowerCase().includes(recherche) ||
        etudiant.filiere.toLowerCase().includes(recherche) ||
        etudiant.ecole.toLowerCase().includes(recherche)
      );
      afficherProfils(resultats);
    });

    function devientPlein() {
      const heartIcon = document.querySelector('.fa-heart');
      heartIcon.classList.toggle('fa-solid');
      heartIcon.classList.toggle('text-purple-600');
    }

  </script>
</body>
</html>
